<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0a2342" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>DaD — Reimposta password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="reset-password" data-i18n-page-title="auth.resetPageTitle">
    <div class="login-page login-page-simple">
      <div class="login-shell">
        <header class="login-simple-brand">
          <span class="brand-logo brand-logo-lg" aria-hidden="true">DaD</span>
        </header>

        <div class="login-card login-card-simple" id="auth-view">
          <h2 class="login-form-title" data-i18n="auth.resetTitle">Reimposta password</h2>
          <p class="login-form-subtitle" data-i18n="auth.resetSubtitle">
            Inserisci email e nome account per impostare una nuova password.
          </p>

          <p class="auth-error hidden" id="auth-error"></p>

          <form id="reset-password-form" class="auth-form login-auth-form">
            <div class="field">
              <label for="reset-email" data-i18n="auth.email">Email</label>
              <input
                type="email"
                id="reset-email"
                autocomplete="username"
                data-i18n-placeholder="auth.emailPlaceholder"
                placeholder="nome@email.it"
                required
              />
            </div>
            <div class="field">
              <label for="reset-name" data-i18n="auth.resetNameLabel">Nome account</label>
              <input
                type="text"
                id="reset-name"
                autocomplete="name"
                data-i18n-placeholder="auth.namePlaceholder"
                placeholder="Il tuo nome"
                required
              />
            </div>
            <div class="field">
              <label for="reset-password" data-i18n="auth.resetNewPassword">Nuova password</label>
              <input
                type="password"
                id="reset-password"
                autocomplete="new-password"
                minlength="6"
                data-i18n-placeholder="auth.passwordChoose"
                placeholder="Scegli una password"
                required
              />
            </div>
            <div class="field">
              <label for="reset-password-confirm" data-i18n="auth.resetConfirmPassword">Conferma password</label>
              <input
                type="password"
                id="reset-password-confirm"
                autocomplete="new-password"
                minlength="6"
                data-i18n-placeholder="auth.resetConfirmPlaceholder"
                placeholder="Ripeti la password"
                required
              />
            </div>
            <button type="submit" class="btn-primary btn-block login-submit" data-i18n="auth.resetSubmit">
              Reimposta password
            </button>
          </form>

          <p class="login-auth-switch">
            <span data-i18n="auth.hasAccount">Hai già un account?</span>
            <a href="login.html" id="login-page-link" data-i18n="auth.backToLogin">Torna al login</a>
          </p>
        </div>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script src="catalog-i18n.js"></script>
    <script src="users-db.js"></script>
    <script src="app.js"></script>
  </body>
</html>
